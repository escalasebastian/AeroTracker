telegram.start.help=👋 Hello! Welcome to *AeroTracker*.\n\nI can help you check flight prices and set tracking alerts:\n\n✈️ *Check price:*\n`/price MAD AMS 2026-08-10`\n\n🎯 *Track flight price:*\n`/track MAD AMS 2026-08-10 150` (One-way, target 150€)\n`/track MAD AMS 2026-08-10 2026-08-17 150` (Round-trip)\n\n📋 *View my active alerts:*\n`/list`\n\n🗑️ *Cancel an alert:*\n`/untrack 1` (Use the number shown in /list)
