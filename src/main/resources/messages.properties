telegram.start.help=\uD83D\uDC4B Hello! Welcome to *AeroTracker*.\n\nI can help you check simulated flight prices using the following commands:\n\n\u2708\uFE0F *One-way:*\n`/price MAD AMS 2026-08-10`\n\n\uD83D\uDD04 *Round-trip:*\n`/price MAD AMS 2026-08-10 2026-08-17`\n\nUse the date format `YYYY-MM-DD`.
telegram.command.unknown=\u26A0\uFE0F Unknown command. Type `/start` to see instructions.
telegram.command.empty=\u26A0\uFE0F Please enter a valid command.
telegram.price.invalid-format=\u26A0\uFE0F Invalid format. Examples:\n\u2708\uFE0F *One-way:* `/price MAD AMS 2026-08-10`\n\uD83D\uDD04 *Round-trip:* `/price MAD AMS 2026-08-10 2026-08-17`
telegram.price.invalid-date=\u26A0\uFE0F Invalid date format. Use the format `YYYY-MM-DD` (e.g. `2026-08-10`).
telegram.price.result=\uD83D\uDCCA *Search Result:*\n\n\uD83D\uDCCD *Origin:* {0}\n\uD83C\uDFC1 *Destination:* {1}\n\uD83D\uDCC5 *Departure:* {2}\n{3}\n\uD83D\uDCB5 *Price:* *{4} {5}*
telegram.price.result.return-date=\uD83D\uDCC5 *Return:* {0}
telegram.error.unexpected=\u26A0\uFE0F An unexpected error occurred while checking the price.
telegram.error.invalid-date-range=\u26A0\uFE0F The return date cannot be earlier than the departure date.