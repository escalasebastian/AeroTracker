telegram.error.invalid-date-range=\u26A0\uFE0F La fecha de vuelta no puede ser anterior a la fecha de ida.
telegram.start.help=👋 \u00A1Hola! Bienvenido a *AeroTracker*.\n\nPuedo ayudarte a consultar precios y crear alertas de vuelos usando los siguientes comandos:\n\n✈️ *Consultar precio:*\n`/price MAD AMS 2026-08-10`\n\n🎯 *Crear alerta de precio:*\n`/track MAD AMS 2026-08-10 150` (Solo ida, objetivo 150€)\n`/track MAD AMS 2026-08-10 2026-08-17 150` (Ida y vuelta)\n\n📋 *Ver mis alertas activas:*\n`/list`\n\n🗑️ *Cancelar una alerta:*\n`/untrack 1` (Usa el número que te muestra /list)
telegram.track.invalid-format=⚠️ Formato incorrecto para /track.\nEjemplos:\n✈️ *Solo ida:* `/track MAD AMS 2026-08-10 150`\n🔄 *Ida y vuelta:* `/track MAD AMS 2026-08-10 2026-08-17 150`
telegram.track.success=🎯 *¡Alerta guardada con éxito!*\n\n✈️ *Ruta:* {0} ➔ {1}\n📅 *Salida:* {2}\n{3}💶 *Precio objetivo:* *{4} €*\n\nTe avisaré en cuanto el precio baje de este monto.
telegram.track.return-line=📅 *Regreso:* {0}\n
telegram.list.header=📋 *Tus alertas activas:*\n\n
telegram.list.empty=📭 No tienes ninguna alerta activa actualmente.\n\nEscribe `/track MAD AMS 2026-08-10 150` para crear una.
telegram.list.item={0}. ✈️ *{1} ➔ {2}* | 📅 {3} | 🎯 *{4} €*\n
telegram.untrack.invalid-format=⚠️ Formato incorrecto. Escribe el número de la alerta que deseas cancelar, por ejemplo:\n`/untrack 1`\n(Usa el comando `/list` para ver tus números).
telegram.untrack.success=🗑️ *Alerta #{0} cancelada correctamente.* Ya no recibirás notificaciones para ese vuelo.
telegram.untrack.not-found=⚠️ No se pudo encontrar o ya estaba cancelada la alerta *#{0}*. Usa `/list` para comprobar tus alertas activas.