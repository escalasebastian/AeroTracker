telegram.start.help=👋 \u00A1Hola! Bienvenido a *AeroTracker*.\n\nPuedo ayudarte a consultar precios de vuelos simulados usando los siguientes comandos:\n\n\u2708\uFE0F *Solo ida:*\n`/price MAD AMS 2026-08-10`\n\n\uD83D\uDD04 *Ida y vuelta:*\n`/price MAD AMS 2026-08-10 2026-08-17`\n\nUsa el formato de fecha `YYYY-MM-DD`.
telegram.command.unknown=\u26A0\uFE0F Comando no reconocido. Escribe `/start` para ver las instrucciones.
telegram.command.empty=\u26A0\uFE0F Por favor, escribe un comando v\u00E1lido.
telegram.price.invalid-format=\u26A0\uFE0F Formato incorrecto. Ejemplos:\n\u2708\uFE0F *Solo ida:* `/price MAD AMS 2026-08-10`\n\uD83D\uDD04 *Ida y vuelta:* `/price MAD AMS 2026-08-10 2026-08-17`
telegram.price.invalid-date=\u26A0\uFE0F Formato de fecha inv\u00E1lido. Usa el formato `YYYY-MM-DD` (ej. `2026-08-10`).
telegram.price.result=\uD83D\uDCCA *Resultado de la b\u00FAsqueda:*\n\n\uD83D\uDCCD *Origen:* {0}\n\uD83C\uDFC1 *Destino:* {1}\n\uD83D\uDCC5 *Ida:* {2}\n{3}\n\uD83D\uDCB5 *Precio:* *{4} {5}*
telegram.price.result.return-date=\uD83D\uDCC5 *Vuelta:* {0}
telegram.error.unexpected=\u26A0\uFE0F Ocurri\u00F3 un error inesperado al consultar el precio.
telegram.error.invalid-date-range=\u26A0\uFE0F La fecha de vuelta no puede ser anterior a la fecha de ida.